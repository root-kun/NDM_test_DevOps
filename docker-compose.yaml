services:
  nginx1:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
    networks:
      backend:
        ipv4_address: 172.20.0.11

  nginx2:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8082:80"
    networks:
      backend:
        ipv4_address: 172.20.0.12

  nginx3:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8083:80"
    networks:
      backend:
        ipv4_address: 172.20.0.13

  app:
    image: kennethreitz/httpbin
    ports:
      - "8080:80"
    networks:
      backend:
        ipv4_address: 172.20.0.100

networks:
  backend:
    ipam:
      config:
        - subnet: 172.20.0.0/16
