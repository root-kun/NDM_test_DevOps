events { worker_connections 1024; }

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_x_forwarded_for"';

    map $valid_xff $xff_prefix {
        "" "";
        default "$valid_xff, ";
    }

    map $realip_remote_addr $current_hop_addr {
        "" $remote_addr;
        default $realip_remote_addr;
    }

    resolver 127.0.0.11;

    # Включаем модуль real_ip
    # Указываем подсеть нашего docker-compose окружения как доверенную
    set_real_ip_from  172.20.0.11;
    set_real_ip_from  172.20.0.12;
    set_real_ip_from  172.20.0.13;
    
    # Говорим Nginx брать IP из X-Forwarded-For, если запрос от доверенного прокси
    real_ip_header    X-Forwarded-For;
    
    # real_ip_recursive on заставляет Nginx искать первый НЕдоверенный IP в цепочке.
    # Но в нашей задаче нам нужно передать СТРОГО всю цепочку, включая сами Nginx.
    real_ip_recursive off;

    server {
        listen 80;

        location / {
            # Если $pix_upstream_xff пустой (запрос пришел от внешнего пользователя),
            # мы инициализируем цепочку только реальным IP ($remote_addr).
            # Если запрос пришел от другого Nginx, $http_x_forwarded_for уже содержит цепочку,
            # и мы добавляем к ней текущий $remote_addr.
            
            set $valid_xff $http_x_forwarded_for;
            
            # Проверка: если запрос пришел НЕ из доверенной сети (от пользователя),
            # принудительно очищаем всё, что он прислал в X-Forwarded-For
            if ($realip_remote_addr !~ "^172\.20\.0\.1[1-3]$") {
                set $valid_xff "";
            }

            # Формируем заголовок для следующего шага
            proxy_set_header X-Forwarded-For "${xff_prefix}$current_hop_addr";
            proxy_set_header X-Next-Hop "";
            
            # Передаем запрос дальше (на следующий хост, заданный через fastcgi/proxy)
            # Для универсальности в docker-compose мы будем передавать хост через заголовки или upstream,
            # но для теста захардкодим логику: если в запросе есть заголовок X-Next-Hop, 
            # идем туда, иначе — в приложение.
            
            set $backend "http://app:80";
            if ($http_x_next_hop) {
                set $backend "http://$http_x_next_hop";
            }
            
            proxy_pass $backend;
        }
    }
}
